server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Resolving via a variable (instead of a bare
    # proxy_pass hostname) makes nginx re-resolve "gateway" on this TTL
    # instead of caching the IP for the life of the worker process — without
    # this, recreating the gateway container (new IP) leaves nginx pointing
    # at a dead address until nginx itself restarts.
    resolver 127.0.0.11 valid=10s;
    set $gateway_upstream http://gateway:8080;

    location /ws/ {
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass $gateway_upstream;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri /index.html;
    }
}
